<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>softymeows's bio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #a855f7;
      --accent-2: #7c3aed;
      --accent-dim: rgba(168, 85, 247, 0.14);
      --accent-glow: rgba(168, 85, 247, 0.30);
      --card-bg: rgba(12, 7, 24, 0.65);
      --card-border: rgba(168, 85, 247, 0.16);
      --card-hover: rgba(168, 85, 247, 0.48);
      --text: #eeeaf8;
      --text-sub: #9d93bb;
      --text-muted: #5e5876;
      --r-sm: 12px;
      --r-md: 18px;
      --r-lg: 26px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #06040e;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* Aurora background */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .aurora-blob:nth-child(1) {
      width: 700px;
      height: 500px;
      top: -180px;
      left: -100px;
      background: radial-gradient(circle, #6d1fd4, transparent 70%);
      animation-duration: 20s;
    }

    .aurora-blob:nth-child(2) {
      width: 500px;
      height: 400px;
      top: 20%;
      right: -120px;
      background: radial-gradient(circle, #3b0f8c, transparent 70%);
      animation-duration: 25s;
      animation-delay: -6s;
    }

    .aurora-blob:nth-child(3) {
      width: 600px;
      height: 350px;
      bottom: -80px;
      left: 30%;
      background: radial-gradient(circle, #1a0550, transparent 70%);
      animation-duration: 22s;
      animation-delay: -10s;
    }

    .aurora-blob:nth-child(4) {
      width: 300px;
      height: 300px;
      top: 50%;
      left: 10%;
      background: radial-gradient(circle, #5b21b6, transparent 70%);
      animation-duration: 30s;
      animation-delay: -3s;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(40px, 30px) scale(1.08);
      }
    }

    /* Snow */
    #snow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* Cat */
    #cat {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 52px;
      height: 52px;
      transform: translate(-50%, -50%);
      display: none;
    }

    /* Main layout */
    .wrap {
      position: relative;
      z-index: 2;
      max-width: 820px;
      margin: 0 auto;
      padding: 72px 28px 80px;
    }

    /* ── HERO ── */
    .hero {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 32px;
      align-items: center;
      padding: 52px 44px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-lg);
      backdrop-filter: blur(18px);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    /* subtle shimmer line on hero */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.35), 0 0 32px rgba(168, 85, 247, 0.25);
    }

    .hero-avatar img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .hero-body {}

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .hero-eyebrow::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--accent);
      display: inline-block;
    }

    .hero-name {
      font-size: clamp(30px, 4.5vw, 44px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.08;
      margin-bottom: 10px;
    }

    .hero-tagline {
      font-size: 14.5px;
      color: var(--text-sub);
      line-height: 1.65;
      max-width: 440px;
      margin-bottom: 18px;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 100px;
      border: 1px solid var(--card-hover);
      color: var(--accent);
      background: var(--accent-dim);
      letter-spacing: 0.01em;
    }

    .pill svg {
      width: 11px;
      height: 11px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      backdrop-filter: blur(14px);
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      color: var(--text-sub);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22d3a0;
      box-shadow: 0 0 8px rgba(34, 211, 160, 0.6);
      flex-shrink: 0;
    }

    .status-divider {
      width: 1px;
      height: 18px;
      background: var(--card-border);
    }

    /* ── SECTION HEADER ── */
    .section {
      margin-bottom: 20px;
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--card-border), transparent);
    }

    /* ── ABOUT CARD ── */
    .about-card {
      padding: 28px 32px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      backdrop-filter: blur(14px);
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--text-sub);
    }

    .about-card p+p {
      margin-top: 12px;
    }

    .about-card strong {
      color: var(--text);
      font-weight: 600;
    }

    .about-card a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }

    .about-card a:hover {
      border-color: var(--accent);
    }

    /* ── SOCIAL GRID ── */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .scard {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 22px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      text-decoration: none;
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      transition: border-color 0.22s, transform 0.22s, box-shadow 0.22s;
      cursor: none;
    }

    /* glow sweep on hover */
    .scard::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.07) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .scard:hover::after {
      opacity: 1;
    }

    .scard:hover {
      border-color: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.15), 0 0 0 1px rgba(168, 85, 247, 0.1);
    }

    .scard-icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 13px;
      background: var(--accent-dim);
      border: 1px solid rgba(168, 85, 247, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: box-shadow 0.22s;
    }

    .scard:hover .scard-icon-wrap {
      box-shadow: 0 0 16px rgba(168, 85, 247, 0.35);
    }

    .scard-icon-wrap svg {
      width: 22px;
      height: 22px;
      fill: var(--accent);
      filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.5));
    }

    .scard-icon-wrap svg.stroke-only {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.6;
    }

    .scard-text {
      flex: 1;
      min-width: 0;
    }

    .scard-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .scard-handle {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .scard-arrow {
      width: 18px;
      height: 18px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
      fill: none;
      stroke: var(--text-muted);
      stroke-width: 2;
    }

    .scard:hover .scard-arrow {
      opacity: 1;
      transform: translate(2px, -2px);
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer-dot {
      display: inline-block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-muted);
      vertical-align: middle;
      margin: 0 6px;
    }

    /* ── MUSIC PLAYER ── */
    .music-player {
      padding: 20px 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      backdrop-filter: blur(14px);
    }

    .music-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .music-art {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .music-art.spinning {
      animation: spin-art 4s linear infinite;
    }

    @keyframes spin-art {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .music-info {
      flex: 1;
      min-width: 0;
    }

    .music-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .music-artist {
      font-size: 12px;
      color: var(--text-sub);
    }

    .music-vol-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .music-vol {
      -webkit-appearance: none;
      appearance: none;
      width: 88px;
      height: 4px;
      border-radius: 2px;
      background: rgba(168, 85, 247, 0.25);
      outline: none;
      cursor: pointer;
    }

    .music-vol::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(168, 85, 247, 0.7);
    }

    .music-vol::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(168, 85, 247, 0.7);
    }

    /* ── Responsive ── */
    @media(max-width:560px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
        padding: 32px 24px;
      }

      .hero-avatar {
        margin: 0 auto;
      }

      .hero-eyebrow {
        justify-content: center;
      }

      .hero-badges {
        justify-content: center;
      }

      .hero-tagline {
        margin: 0 auto 18px;
      }

      .social-grid {
        grid-template-columns: 1fr;
      }

      .status-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .status-divider {
        display: none;
      }

      .wrap {
        padding: 48px 16px 60px;
      }
    }
  </style>
</head>

  <script>
    /* Snow */
    (function () {
      const c = document.getElementById('snow');
      const x = c.getContext('2d');
      let W, H, fl = [];
      function sz() { W = c.width = innerWidth; H = c.height = innerHeight; }
      sz(); addEventListener('resize', sz);
      function mf() { return { x: Math.random() * W, y: Math.random() * -H, r: Math.random() * 2.2 + 0.6, sp: Math.random() * 0.65 + 0.2, dr: (Math.random() - .5) * .3, op: Math.random() * .4 + 0.15 }; }
      for (let i = 0; i < 130; i++) { const f = mf(); f.y = Math.random() * H; fl.push(f); }
      function draw() {
        x.clearRect(0, 0, W, H);
        for (const f of fl) {
          x.beginPath(); x.arc(f.x, f.y, f.r, 0, Math.PI * 2);
          x.fillStyle = `rgba(210,200,255,${f.op})`; x.fill();
          f.y += f.sp; f.x += f.dr;
          if (f.y > H + 5) Object.assign(f, mf());
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* Cat cursor */
    (function () {
      const cat = document.getElementById('cat');
      let cx = -300, cy = -300, tx = -300, ty = -300, shown = false, flip = false, px = -300, fr = 0;
      document.addEventListener('mousemove', e => {
        tx = e.clientX; ty = e.clientY;
        if (!shown) { cat.style.display = 'block'; shown = true; }
        if (tx < px) flip = true; else if (tx > px) flip = false;
        px = tx;
      });
      function go() {
        cx += (tx - cx) * .1; cy += (ty - cy) * .1; fr++;
        const b = Math.sin(fr * .18) * 2.5;
        cat.style.left = cx + 'px'; cat.style.top = (cy + b) + 'px';
        cat.style.transform = `translate(-50%,-50%) scaleX(${flip ? -1 : 1})`;
        requestAnimationFrame(go);
      }
      go();
    })();
    /* Music Player — autoplay with volume slider only */
    (function () {
      // ── PUT YOUR AUDIO FILES HERE ──────────────────────────────────────
      const tracks = [
        { title: 'Song Title',   artist: 'Artist Name',   src: 'audio/track1.mp3' },
        { title: 'Song Title 2', artist: 'Artist Name 2', src: 'audio/track2.mp3' },
      ];
      // ──────────────────────────────────────────────────────────────────

      let current = 0;
      const audio   = document.getElementById('bgAudio');
      const titleEl = document.getElementById('musicTitle');
      const artEl   = document.getElementById('musicArtist');
      const artWrap = document.getElementById('musicArt');
      const vol     = document.getElementById('musicVol');

      function loadTrack(idx) {
        const t = tracks[idx];
        audio.src         = t.src;
        titleEl.textContent = t.title;
        artEl.textContent   = t.artist;
      }

      // autoplay next track when one ends
      audio.addEventListener('ended', () => {
        current = (current + 1) % tracks.length;
        loadTrack(current);
        audio.play();
      });

      // spinning art while playing
      audio.addEventListener('play',  () => artWrap.classList.add('spinning'));
      audio.addEventListener('pause', () => artWrap.classList.remove('spinning'));

      // volume slider
      vol.addEventListener('input', () => { audio.volume = vol.value / 100; });
      audio.volume = vol.value / 100;

      // load first track and autoplay
      loadTrack(0);
      // browsers require a user gesture before autoplay; try anyway, it works on most GitHub Pages hosts
      audio.play().catch(() => {
        // if blocked, retry on first click anywhere
        document.addEventListener('click', () => audio.play(), { once: true });
      });
    })();
  </script>
