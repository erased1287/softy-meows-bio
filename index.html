  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #a855f7;
      --accent-2: #7c3aed;
      --accent-dim: rgba(168, 85, 247, 0.14);
      --accent-glow: rgba(168, 85, 247, 0.30);
      --card-bg: rgba(12, 7, 24, 0.65);
      --card-border: rgba(168, 85, 247, 0.16);
      --card-hover: rgba(168, 85, 247, 0.48);
      --text: #eeeaf8;
      --text-sub: #9d93bb;
      --text-muted: #5e5876;
      --r-sm: 12px;
      --r-md: 18px;
      --r-lg: 26px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: #06040e;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* Aurora background */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .aurora-blob:nth-child(1) { width: 700px; height: 500px; top: -180px; left: -100px; background: radial-gradient(circle, #6d1fd4, transparent 70%); animation-duration: 20s; }
    .aurora-blob:nth-child(2) { width: 500px; height: 400px; top: 20%; right: -120px; background: radial-gradient(circle, #3b0f8c, transparent 70%); animation-duration: 25s; animation-delay: -6s; }
    .aurora-blob:nth-child(3) { width: 600px; height: 350px; bottom: -80px; left: 30%; background: radial-gradient(circle, #1a0550, transparent 70%); animation-duration: 22s; animation-delay: -10s; }
    .aurora-blob:nth-child(4) { width: 300px; height: 300px; top: 50%; left: 10%; background: radial-gradient(circle, #5b21b6, transparent 70%); animation-duration: 30s; animation-delay: -3s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* Snow */
    #snow { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

    /* Audio visualizer sphere */
    #vizCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.92;
    }

    /* Cat cursor */
    #cat {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 52px;
      height: 52px;
      transform: translate(-50%, -50%);
      display: none;
    }

    /* Main layout */
    .wrap {
      position: relative;
      z-index: 2;
      max-width: 820px;
      margin: 0 auto;
      padding: 72px 28px 80px;
    }

    /* ── HERO ── */
    .hero {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 32px;
      align-items: center;
      padding: 52px 44px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-lg);
      backdrop-filter: blur(18px);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.35), 0 0 32px rgba(168, 85, 247, 0.25);
    }

    .hero-avatar img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .hero-eyebrow::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--accent);
      display: inline-block;
    }

    .hero-name {
      font-size: clamp(30px, 4.5vw, 44px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.08;
      margin-bottom: 10px;
    }

    .hero-tagline {
      font-size: 14.5px;
      color: var(--text-sub);
      line-height: 1.65;
      max-width: 440px;
      margin-bottom: 18px;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 100px;
      border: 1px solid var(--card-hover);
      color: var(--accent);
      background: var(--accent-dim);
      letter-spacing: 0.01em;
    }

    .pill svg {
      width: 11px;
      height: 11px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      backdrop-filter: blur(14px);
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      color: var(--text-sub);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22d3a0;
      box-shadow: 0 0 8px rgba(34, 211, 160, 0.6);
      flex-shrink: 0;
    }

    .status-divider { width: 1px; height: 18px; background: var(--card-border); }

    /* ── SECTION HEADER ── */
    .section { margin-bottom: 20px; }

    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--card-border), transparent);
    }

    /* ── ABOUT CARD ── */
    .about-card {
      padding: 28px 32px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      backdrop-filter: blur(14px);
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--text-sub);
    }

    .about-card p+p { margin-top: 12px; }
    .about-card strong { color: var(--text); font-weight: 600; }
    .about-card a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .2s; }
    .about-card a:hover { border-color: var(--accent); }

    /* ── SOCIAL GRID ── */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .scard {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 22px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      text-decoration: none;
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      transition: border-color 0.22s, transform 0.22s, box-shadow 0.22s;
      cursor: none;
    }

    .scard::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.07) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .scard:hover::after { opacity: 1; }

    .scard:hover {
      border-color: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.15), 0 0 0 1px rgba(168, 85, 247, 0.1);
    }

    .scard-icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 13px;
      background: var(--accent-dim);
      border: 1px solid rgba(168, 85, 247, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: box-shadow 0.22s;
    }

    .scard:hover .scard-icon-wrap { box-shadow: 0 0 16px rgba(168, 85, 247, 0.35); }

    .scard-icon-wrap svg {
      width: 22px;
      height: 22px;
      fill: var(--accent);
      filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.5));
    }

    .scard-icon-wrap svg.stroke-only {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.6;
    }

    .scard-text { flex: 1; min-width: 0; }
    .scard-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .scard-handle { font-size: 12px; color: var(--accent); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .scard-arrow {
      width: 18px;
      height: 18px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
      fill: none;
      stroke: var(--text-muted);
      stroke-width: 2;
    }

    .scard:hover .scard-arrow { opacity: 1; transform: translate(2px, -2px); }

    /* ── FOOTER ── */
    footer {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-text { font-size: 12px; color: var(--text-muted); }
    .footer-text a { color: var(--accent); text-decoration: none; }
    .footer-dot { display: inline-block; width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted); vertical-align: middle; margin: 0 6px; }

    /* ── MUSIC PLAYER ── */
    .music-player {
      padding: 20px 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-md);
      backdrop-filter: blur(14px);
    }

    .music-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .music-art {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .music-art.spinning {
      animation: spin-art 4s linear infinite;
    }

    @keyframes spin-art {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .music-info { flex: 1; min-width: 0; }

    .music-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .music-artist { font-size: 12px; color: var(--text-sub); }

    /* Loading / error state */
    .music-status {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      font-style: italic;
    }

    .music-vol-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .music-vol {
      -webkit-appearance: none;
      appearance: none;
      width: 88px;
      height: 4px;
      border-radius: 2px;
      background: rgba(168, 85, 247, 0.25);
      outline: none;
      cursor: pointer;
    }

    .music-vol::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(168, 85, 247, 0.7);
    }

    .music-vol::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(168, 85, 247, 0.7);
    }

    /* ── Responsive ── */
    @media(max-width:560px) {
      .hero { grid-template-columns: 1fr; text-align: center; padding: 32px 24px; }
      .hero-avatar { margin: 0 auto; }
      .hero-eyebrow { justify-content: center; }
      .hero-badges { justify-content: center; }
      .hero-tagline { margin: 0 auto 18px; }
      .social-grid { grid-template-columns: 1fr; }
      .status-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
      .status-divider { display: none; }
      .wrap { padding: 48px 16px 60px; }
      .music-vol { width: 64px; }
    }
  </style>
</head>

  <script>
    /* Snow */
    (function () {
      const c = document.getElementById('snow');
      const x = c.getContext('2d');
      let W, H, fl = [];
      function sz() { W = c.width = innerWidth; H = c.height = innerHeight; }
      sz(); addEventListener('resize', sz);
      function mf() { return { x: Math.random() * W, y: Math.random() * -H, r: Math.random() * 2.2 + 0.6, sp: Math.random() * 0.65 + 0.2, dr: (Math.random() - .5) * .3, op: Math.random() * .4 + 0.15 }; }
      for (let i = 0; i < 130; i++) { const f = mf(); f.y = Math.random() * H; fl.push(f); }
      function draw() {
        x.clearRect(0, 0, W, H);
        for (const f of fl) {
          x.beginPath(); x.arc(f.x, f.y, f.r, 0, Math.PI * 2);
          x.fillStyle = `rgba(210,200,255,${f.op})`; x.fill();
          f.y += f.sp; f.x += f.dr;
          if (f.y > H + 5) Object.assign(f, mf());
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* Cat cursor */
    (function () {
      const cat = document.getElementById('cat');
      let cx = -300, cy = -300, tx = -300, ty = -300, shown = false, flip = false, px = -300, fr = 0;
      document.addEventListener('mousemove', e => {
        tx = e.clientX; ty = e.clientY;
        if (!shown) { cat.style.display = 'block'; shown = true; }
        if (tx < px) flip = true; else if (tx > px) flip = false;
        px = tx;
      });
      function go() {
        cx += (tx - cx) * .1; cy += (ty - cy) * .1; fr++;
        const b = Math.sin(fr * .18) * 2.5;
        cat.style.left = cx + 'px'; cat.style.top = (cy + b) + 'px';
        cat.style.transform = `translate(-50%,-50%) scaleX(${flip ? -1 : 1})`;
        requestAnimationFrame(go);
      }
      go();
    })();

    /* Music Player */
    (function () {
      const tracks = [
        // ── ADD YOUR TRACKS HERE ─────────────────────────────────────────
        // Use a relative path to a file in your own repo (e.g. "audio/track1.mp3")
        // or a link from a host that sends CORS headers (GitHub raw, jsDelivr, etc).
        // A link like severe.wtf will NOT work — it blocks cross-origin requests.
        { title: 'Track 1', artist: '', src: 'tracks/Clara La San - Want U 𝘴𝘭𝘰𝘸𝘦𝘥 reverb.mp3' },
        // { title: 'Song name', artist: 'Artist', src: 'audio/track2.mp3' },
        // ─────────────────────────────────────────────────────────────────
      ];

      let current = 0;
      const audio    = document.getElementById('bgAudio');
      const titleEl  = document.getElementById('musicTitle');
      const artistEl = document.getElementById('musicArtist');
      const statusEl = document.getElementById('musicStatus');
      const artWrap  = document.getElementById('musicArt');
      const vol      = document.getElementById('musicVol');

      function setStatus(msg) { statusEl.textContent = msg; }

      audio.addEventListener('play',    () => { artWrap.classList.add('spinning'); setStatus(''); });
      audio.addEventListener('pause',   () => artWrap.classList.remove('spinning'));
      audio.addEventListener('waiting', () => setStatus('Buffering…'));
      audio.addEventListener('canplay', () => setStatus(''));
      audio.addEventListener('error',   () => setStatus('Could not load this file — check the path/URL'));
      audio.addEventListener('ended',   () => {
        current = (current + 1) % tracks.length;
        loadTrack(current);
        attemptPlay();
      });

      vol.addEventListener('input', () => { audio.volume = vol.value / 100; });
      audio.volume = vol.value / 100;

      function loadTrack(idx) {
        const t = tracks[idx];
        titleEl.textContent  = t.title;
        artistEl.textContent = t.artist || '';
        audio.src = t.src;
        audio.load();
      }

      function attemptPlay() {
        audio.play().catch(() => {
          setStatus('Click anywhere to play ♪');
          document.addEventListener('click', () => {
            audio.play().then(() => setStatus('')).catch(() => setStatus('Could not load this file'));
          }, { once: true });
        });
      }

      loadTrack(0);
      attemptPlay();
    })();
    /* Audio-reactive sphere visualizer (wireframe mesh + bars, palette-matched, glowing) */
    (function () {
      const canvas = document.getElementById('vizCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, cx, cy;
      function resize() {
        W = canvas.width = innerWidth;
        H = canvas.height = innerHeight;
        cx = W / 2;
        cy = H / 2;
      }
      resize();
      addEventListener('resize', resize);

      const audio = document.getElementById('bgAudio');
      let analyser, dataArray, audioCtx, sourceNode;
      let graphAttached = false;
      let graphFailed = false;

      // Only attach the Web Audio graph if the element was loaded with
      // crossorigin="anonymous" AND actually has it set right now — otherwise
      // createMediaElementSource() will silently mute the element in some
      // browsers when the source is cross-origin without proper CORS headers.
      // Safer to just skip the visualizer's real-audio mode entirely than to
      // risk breaking playback.
      function tryAttachGraph() {
        if (graphAttached || graphFailed) return;
        if (!audio.hasAttribute('crossorigin')) {
          // No CORS opt-in on this source — don't even try, just stay in idle mode.
          graphFailed = true;
          return;
        }
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          sourceNode = audioCtx.createMediaElementSource(audio);
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 128;
          dataArray = new Uint8Array(analyser.frequencyBinCount);
          sourceNode.connect(analyser);
          analyser.connect(audioCtx.destination);
          graphAttached = true;
        } catch (e) {
          // Some browsers throw immediately on a tainted cross-origin element.
          // Fail quietly and keep using the idle ambient animation instead.
          console.warn('Visualizer: real-audio analysis unavailable for this source, using idle animation.', e);
          graphFailed = true;
          analyser = null;
        }
      }

      audio.addEventListener('play', () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        tryAttachGraph();
      });
      document.addEventListener('click', () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }, { once: true });

      // ── Palette (matches --accent / --accent-2 / --accent-glow) ──
      const COL_CORE   = '124, 58, 237';   // --accent-2  deep violet
      const COL_MID    = '168, 85, 247';   // --accent    main purple
      const COL_BRIGHT = '216, 180, 254';  // light lilac highlight

      // ── Sphere geometry: Fibonacci distribution ──
      const NUM_PTS = 120;
      const RADIUS = Math.min(260, Math.min(innerWidth, innerHeight) * 0.30);
      const points = [];
      (function buildSphere() {
        const offset = 2 / NUM_PTS;
        const increment = Math.PI * (3 - Math.sqrt(5));
        for (let i = 0; i < NUM_PTS; i++) {
          const y = (i * offset) - 1 + (offset / 2);
          const r = Math.sqrt(1 - y * y);
          const phi = i * increment;
          const x = Math.cos(phi) * r;
          const z = Math.sin(phi) * r;
          points.push({ x, y, z, freqIdx: i % 32, idx: i });
        }
      })();

      // Precompute nearest-neighbour edges for the wireframe mesh
      const edges = [];
      (function buildMesh() {
        const maxNeighbours = 3;
        const maxDist = 0.42; // chord distance threshold on unit sphere
        for (let i = 0; i < points.length; i++) {
          const dists = [];
          for (let j = 0; j < points.length; j++) {
            if (i === j) continue;
            const dx = points[i].x - points[j].x;
            const dy = points[i].y - points[j].y;
            const dz = points[i].z - points[j].z;
            const d = Math.sqrt(dx * dx + dy * dy + dz * dz);
            if (d < maxDist) dists.push({ j, d });
          }
          dists.sort((a, b) => a.d - b.d);
          for (let k = 0; k < Math.min(maxNeighbours, dists.length); k++) {
            const a = i, b = dists[k].j;
            const key = a < b ? a + '_' + b : b + '_' + a;
            if (!edges._seen) edges._seen = new Set();
            if (!edges._seen.has(key)) {
              edges._seen.add(key);
              edges.push([a, b]);
            }
          }
        }
      })();

      let rotation = 0;
      let smoothed = new Array(NUM_PTS).fill(0);
      let bassLevel = 0;

      function draw() {
        ctx.clearRect(0, 0, W, H);

        if (analyser) analyser.getByteFrequencyData(dataArray);

        // overall bass energy -> drives global glow + breathing scale
        if (dataArray) {
          let sum = 0;
          for (let i = 0; i < 8; i++) sum += dataArray[i];
          bassLevel += ((sum / 8 / 255) - bassLevel) * 0.15;
        } else {
          bassLevel += ((Math.sin(rotation * 8) * 0.2 + 0.25) - bassLevel) * 0.1;
        }

        rotation += 0.0026;
        const cosR = Math.cos(rotation);
        const sinR = Math.sin(rotation);
        const breathe = 1 + bassLevel * 0.12;

        // rotate + project all points
        const proj = points.map(p => {
          const x = p.x * cosR - p.z * sinR;
          const z = p.x * sinR + p.z * cosR;
          const y = p.y;
          const scale = (1 / (2.1 - z)) * breathe;
          const sx = cx + x * RADIUS * scale;
          const sy = cy + y * RADIUS * scale;

          let amp = 0;
          if (dataArray) {
            amp = dataArray[p.freqIdx] / 255;
          } else {
            amp = (Math.sin(rotation * 30 + p.freqIdx) + 1) / 2 * 0.22;
          }
          smoothed[p.idx] += (amp - smoothed[p.idx]) * 0.25;

          return { sx, sy, z, scale, amp: smoothed[p.idx], nx: x, ny: y };
        });

        // ── Wireframe mesh (drawn first, behind bars) ──
        ctx.lineWidth = 1;
        for (const [a, b] of edges) {
          const pa = proj[a], pb = proj[b];
          const avgZ = (pa.z + pb.z) / 2;
          const depthFade = (avgZ + 1) / 2;
          const meshAlpha = (0.04 + depthFade * 0.16) * (0.7 + bassLevel * 0.6);
          ctx.strokeStyle = `rgba(${COL_MID}, ${meshAlpha})`;
          ctx.beginPath();
          ctx.moveTo(pa.sx, pa.sy);
          ctx.lineTo(pb.sx, pb.sy);
          ctx.stroke();
        }

        // sort points back-to-front for the radiating bars
        const order = proj.map((p, i) => i).sort((i, j) => proj[i].z - proj[j].z);

        ctx.lineCap = 'round';
        for (const i of order) {
          const p = proj[i];
          const amp = p.amp;

          const barLen = 10 + amp * 95;
          const dirLen = Math.sqrt(p.nx * p.nx + p.ny * p.ny) || 0.0001;
          const dx = (p.nx / dirLen) * barLen * p.scale;
          const dy = (p.ny / dirLen) * barLen * p.scale;

          const depthFade = (p.z + 1) / 2;
          const alpha = 0.25 + depthFade * 0.55 + amp * 0.2;
          const width = 1.6 + depthFade * 2.6 + amp * 2;

          // glow via shadow blur, intensified by bass + per-point amplitude
          ctx.shadowBlur = 6 + amp * 26 + bassLevel * 18;
          ctx.shadowColor = `rgba(${COL_BRIGHT}, ${Math.min(1, 0.5 + amp * 0.6)})`;

          const grad = ctx.createLinearGradient(p.sx, p.sy, p.sx + dx, p.sy + dy);
          grad.addColorStop(0, `rgba(${COL_CORE}, ${alpha * 0.35})`);
          grad.addColorStop(0.55, `rgba(${COL_MID}, ${alpha * 0.85})`);
          grad.addColorStop(1, `rgba(${COL_BRIGHT}, ${alpha})`);

          ctx.strokeStyle = grad;
          ctx.lineWidth = width;
          ctx.beginPath();
          ctx.moveTo(p.sx, p.sy);
          ctx.lineTo(p.sx + dx, p.sy + dy);
          ctx.stroke();

          // glowing tip
          ctx.beginPath();
          ctx.arc(p.sx + dx, p.sy + dy, width * 0.65, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${COL_BRIGHT}, ${Math.min(1, alpha * 1.1)})`;
          ctx.fill();

          ctx.shadowBlur = 0;
        }

        // soft core glow at the centre of the sphere
        const coreR = RADIUS * 0.5 * breathe;
        const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
        coreGrad.addColorStop(0, `rgba(${COL_MID}, ${0.10 + bassLevel * 0.18})`);
        coreGrad.addColorStop(1, `rgba(${COL_MID}, 0)`);
        ctx.fillStyle = coreGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
